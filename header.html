<style>
/* ── NAV BASE ── */
#nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 52px;
  height: 68px;
  background: rgba(255, 255, 255, 0.97);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(0, 0, 0, 0.07);
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s;
  font-family: 'Barlow', sans-serif;
  box-sizing: border-box;
}

#nav.scrolled { box-shadow: 0 2px 24px rgba(0, 0, 0, 0.06); }

/* ── LOGO ── */
#nav .logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}


/* ── DESKTOP LINKS ── */
#nav .nav-ul {
  display: flex;
  align-items: center;
  gap: 4px;
  list-style: none;
  margin: 0; padding: 0;
}
#nav .nav-ul a {
  text-decoration: none;
  font-size: 12px; font-weight: 700; letter-spacing: 0.6px;
  color: #444; text-transform: uppercase;
  padding: 7px 12px; border-radius: 5px;
  transition: color 0.2s, background 0.2s;
  white-space: nowrap; display: block;
}
#nav .nav-ul a:hover, #nav .nav-ul a.act {
  color: var(--or, #E8500A);
  background: rgba(232, 80, 10, 0.07);
}

/* ── RIGHT SIDE ── */
#nav .nav-r { display: flex; align-items: center; gap: 14px; }
#nav .nav-phone {
  font-size: 12px; font-weight: 600;
  color: var(--gy, #666); letter-spacing: 0.3px;
  white-space: nowrap;
}

/* ── GET A QUOTE BTN ── */
#nav .btn-quote {
  background: var(--or, #E8500A);
  color: white;
  padding: 10px 20px; border-radius: 6px;
  font-size: 12px; font-weight: 700; letter-spacing: 0.8px;
  text-decoration: none; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
  overflow: hidden; position: relative;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s;
  flex-shrink: 0;
}
#nav .btn-quote::before {
  content: '';
  position: absolute; inset: 0;
  background: rgba(255, 255, 255, 0.2);
  transform: translateX(-110%) skewX(-15deg);
  transition: transform 0.42s;
}
#nav .btn-quote:hover::before { transform: translateX(120%) skewX(-15deg); }
#nav .btn-quote:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232, 80, 10, 0.35); }

/* ── HAMBURGER ── */
#nav .nav-menu {
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  cursor: pointer;
  padding: 8px;
  border-radius: 6px;
  border: 1.5px solid rgba(0,0,0,0.12);
  transition: border-color 0.2s;
  flex-shrink: 0;
}
#nav .nav-menu:hover { border-color: var(--or, #E8500A); }
#nav .nav-menu span {
  display: block;
  width: 20px; height: 2px;
  background: #111;
  border-radius: 1px;
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}
/* Hamburger open → X animation */
#nav .nav-menu.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
#nav .nav-menu.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
#nav .nav-menu.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* ── MOBILE DRAWER ── */
#nav-drawer {
  position: fixed;
  top: 68px; left: 0; right: 0;
  z-index: 999;
  background: rgba(255, 255, 255, 0.98);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(0,0,0,0.08);
  padding: 0;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.45s cubic-bezier(0.16, 1, 0.3, 1), padding 0.3s ease;
  display: none;
}
#nav-drawer.open {
  max-height: 480px;
  padding: 16px 0 24px;
}
#nav-drawer ul {
  list-style: none;
  margin: 0; padding: 0 24px;
  display: flex; flex-direction: column; gap: 2px;
}
#nav-drawer ul li a {
  display: block;
  padding: 13px 16px;
  font-family: 'Barlow', sans-serif;
  font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
  color: #333; text-transform: uppercase; text-decoration: none;
  border-radius: 8px;
  transition: color 0.2s, background 0.2s;
  border-left: 3px solid transparent;
}
#nav-drawer ul li a:hover, #nav-drawer ul li a.act {
  color: var(--or, #E8500A);
  background: rgba(232, 80, 10, 0.06);
  border-left-color: var(--or, #E8500A);
}
#nav-drawer .drawer-footer {
  padding: 16px 24px 0;
  border-top: 1px solid rgba(0,0,0,0.07);
  margin-top: 14px;
  display: flex; flex-direction: column; gap: 10px;
}
#nav-drawer .drawer-phone {
  font-size: 13px; font-weight: 600; color: #666;
  display: flex; align-items: center; gap: 8px;
}
#nav-drawer .drawer-phone i { color: var(--or, #E8500A); font-size: 12px; }
#nav-drawer .drawer-quote {
  background: var(--or, #E8500A);
  color: white;
  padding: 13px 20px; border-radius: 8px;
  font-size: 13px; font-weight: 700; letter-spacing: 0.6px;
  text-decoration: none; text-transform: uppercase;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: opacity 0.2s;
}
#nav-drawer .drawer-quote:hover { opacity: 0.9; }

/* ── RESPONSIVE BREAKPOINTS ── */
@media (max-width: 1200px) {
  #nav { padding: 0 28px; }
}
@media (max-width: 960px) {
  #nav { padding: 0 20px; }
  #nav .nav-phone { display: none; }
  #nav .nav-ul a { padding: 7px 9px; font-size: 11px; }
}
@media (max-width: 768px) {
  #nav .nav-ul { display: none; }
  #nav .nav-phone { display: none; }
  #nav .btn-quote { display: none; }
  #nav .nav-menu { display: flex; }
  #nav-drawer { display: block; }
}
@media (max-width: 480px) {
  #nav { padding: 0 16px; height: 60px; }
  #nav-drawer { top: 60px; }
  #nav .lo-txt .ln { font-size: 15px; }
}
</style>

<nav id="nav">
  <a href="index.html" class="logo">
    <img src="images/ISHA%20EVENTS.png" alt="Isha Events Logo" style="height: 50px; width: auto; object-fit: contain;">
  </a>
  <ul class="nav-ul">
    <li><a href="index.html#about">About Us</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="gallery.html" class="nav-gallery">Gallery</a></li>
    <li><a href="contact.html">Contact Us</a></li>
  </ul>
  <div class="nav-r">
    <span class="nav-phone">+91 98765 43210</span>
    <a href="contact.html" class="btn-quote">Get A Quote <i class="fas fa-arrow-right" style="font-size:11px"></i></a>
    <div class="nav-menu" id="navMenu"><span></span><span></span><span></span></div>
  </div>
</nav>

<!-- MOBILE DRAWER -->
<div id="nav-drawer">
  <ul>
    <li><a href="index.html#about">About Us</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="contact.html">Contact Us</a></li>
  </ul>
  <div class="drawer-footer">
    <div class="drawer-phone"><i class="fas fa-phone-alt"></i> +91 98765 43210</div>
    <a href="contact.html" class="drawer-quote">Get A Quote <i class="fas fa-arrow-right" style="font-size:11px"></i></a>
  </div>
</div>

<script>
(function() {
  var menu = document.getElementById('navMenu');
  var drawer = document.getElementById('nav-drawer');
  if (!menu || !drawer) return;

  menu.addEventListener('click', function() {
    var isOpen = drawer.classList.toggle('open');
    menu.classList.toggle('open', isOpen);
  });

  // Close drawer on link click
  drawer.querySelectorAll('a').forEach(function(link) {
    link.addEventListener('click', function() {
      drawer.classList.remove('open');
      menu.classList.remove('open');
    });
  });

  // Close drawer on outside click
  document.addEventListener('click', function(e) {
    if (!document.getElementById('nav').contains(e.target) && !drawer.contains(e.target)) {
      drawer.classList.remove('open');
      menu.classList.remove('open');
    }
  });
})();
</script>
